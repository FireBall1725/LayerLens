name: Feature request
description: Suggest a new capability or improvement
title: "[feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. A few quick questions to make sure
        the proposal is well-framed.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Frame the user-facing pain. What's not working today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Sketch what the feature would do — UX, UI, behaviour.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Other ways to solve the same problem, or workarounds.
    validations:
      required: false
